<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Electron Cloud</title>
<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Share+Tech+Mono&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box;}
body{
  background:#f4f6fa;
  color:#1a2a3a;
  font-family:'Share Tech Mono',monospace;
  display:flex;flex-direction:column;align-items:center;
  min-height:100vh;overflow-x:hidden;
}
#back-btn{
  position:fixed;top:12px;left:14px;z-index:999;
  background:#1e3a5f;color:#fff;border:none;border-radius:20px;
  padding:8px 18px;font-family:'Share Tech Mono',monospace;
  font-size:.8rem;letter-spacing:.06em;cursor:pointer;
  text-decoration:none;transition:background .2s;
}
#back-btn:hover{background:#2d5491;}
.warn-bar{
  width:100%;background:#7a0000;color:#ffdddd;
  text-align:center;padding:7px 12px;
  font-size:.74rem;letter-spacing:.07em;display:none;
}
.warn-bar.show{display:block;}
header{text-align:center;padding:52px 16px 6px;}
header h1{
  font-family:'Orbitron',monospace;
  font-size:clamp(1.1rem,3.5vw,1.9rem);
  font-weight:900;letter-spacing:.15em;color:#1a2a3a;
}
header .sub{
  font-size:.72rem;color:#4a6a8a;letter-spacing:.18em;
  margin-top:4px;text-transform:uppercase;
}
/* Legend */
.orbital-legend{
  display:flex;flex-wrap:wrap;gap:9px;
  justify-content:center;max-width:860px;
  padding:10px 16px 6px;
}
.ol-item{
  display:flex;align-items:center;gap:9px;
  background:#fff;border:2px solid #d0dcea;border-radius:10px;
  padding:7px 14px;box-shadow:0 2px 6px rgba(0,0,0,.07);
}
.ol-dot{width:13px;height:13px;border-radius:50%;flex-shrink:0;}
.ol-text{display:flex;flex-direction:column;gap:1px;}
.ol-sym{
  font-family:'Orbitron',monospace;font-size:.95rem;
  font-weight:700;letter-spacing:.04em;line-height:1.1;
}
.ol-det{font-size:.66rem;color:#5a7a9a;letter-spacing:.02em;}
/* Canvas */
.canvas-wrap{
  position:relative;margin:8px auto;
  border-radius:10px;overflow:hidden;
  box-shadow:0 4px 28px rgba(0,0,0,.13);
}
canvas{display:block;}
/* Controls */
.controls{
  display:flex;gap:10px;flex-wrap:wrap;
  justify-content:center;padding:10px 0 6px;
}
button{
  padding:7px 20px;background:#fff;
  border:2px solid #b0c8e0;color:#1a4aaa;
  font-family:'Share Tech Mono',monospace;font-size:.76rem;
  letter-spacing:.1em;cursor:pointer;border-radius:4px;
  text-transform:uppercase;transition:all .18s;
  box-shadow:0 2px 6px rgba(0,0,0,.07);
}
button:hover{background:#e8f0ff;border-color:#1a4aaa;}
button.active{background:#1a4aaa;border-color:#1a4aaa;color:#fff;}
/* Info cards */
.info-grid{
  display:grid;grid-template-columns:repeat(auto-fit,minmax(200px,1fr));
  gap:12px;max-width:860px;width:100%;
  padding:6px 16px 28px;margin-top:2px;
}
.info-card{
  background:#fff;border:1px solid #d0dcea;
  border-radius:8px;padding:12px 16px;
  box-shadow:0 2px 8px rgba(0,0,0,.06);
}
.info-card h3{
  font-family:'Orbitron',monospace;font-size:.62rem;
  letter-spacing:.2em;color:#1a4aaa;margin-bottom:7px;
  text-transform:uppercase;
}
.info-card p{font-size:.76rem;line-height:1.65;color:#3a5a7a;}
.info-card p strong{color:#1a2a3a;}
@media(max-width:540px){
  .info-grid{grid-template-columns:1fr;}
  button{padding:6px 14px;font-size:.7rem;}
}
</style>
</head>
<body>

<a id="back-btn" href="../index.html">&#8592; Back</a>
<div class="warn-bar" id="wbar">&#9762;&nbsp; SYNTHETIC / RADIOACTIVE ELEMENT &nbsp;&#9762;</div>

<header>
  <h1 id="el-title">LOADING&hellip;</h1>
  <div class="sub" id="el-sub">Quantum Mechanical Electron Cloud Model</div>
</header>

<div class="orbital-legend" id="legend"></div>

<div class="canvas-wrap">
  <canvas id="c"></canvas>
</div>

<div class="controls">
  <button id="btnCloud" class="active" onclick="setMode('cloud')">Cloud View</button>
  <button id="btnOrbit" onclick="setMode('orbit')">Orbital View</button>
  <button id="btnPause" onclick="togglePause()">Pause</button>
</div>

<div class="info-grid" id="info-grid"></div>

<script src="../elements-data.js"></script>
<script>
/* ================================================================
   Dynamic Electron Cloud — renders quantum mechanical orbital clouds
   for any of the 118 elements via URL parameter (?n=79 for Gold).
   Dot clouds are regenerated each frame for a shimmering effect.
   Two views: Cloud View (probability dots) and Orbital View (paths).
   ================================================================ */

/* Fallback color palette indexed by shell number (1-7) */
var SCOL = ['','#0044cc','#006622','#660099','#007788','#990033','#884400','#1a5599'];

/* Unique vivid color assigned per subshell in Aufbau order — all 19 subshells distinct */
var SUBSHELL_COLORS = {
  '1s':'#0044dd','2s':'#006622','2p':'#cc4400',
  '3s':'#7700aa','3p':'#008899','4s':'#cc0022',
  '3d':'#886600','4p':'#447700','5s':'#1166bb',
  '4d':'#aa0066','5p':'#005577','6s':'#bb5500',
  '4f':'#550088','5d':'#006644','6p':'#774400',
  '7s':'#003399','5f':'#005566','6d':'#770022','7p':'#556600'
};

/*
 * Returns the color for a given subshell object.
 * Falls back to shell color if the subshell key is not in SUBSHELL_COLORS.
 * ss: subshell object with properties n (shell number) and tp (orbital type s/p/d/f)
 */
function subCol(ss){ return SUBSHELL_COLORS[ss.n+ss.tp] || SCOL[ss.n] || '#333'; }

/*
 * Converts a CSS hex color string to an [R, G, B] integer array.
 * Used to build rgba() strings for SVG ring colors in Orbital View.
 * hex: color string in '#rrggbb' format
 */
function hexRGB(hex){ return [parseInt(hex.slice(1,3),16),parseInt(hex.slice(3,5),16),parseInt(hex.slice(5,7),16)]; }

/* Nucleus glow color by element category — each category has a distinct color */
var NCLR = {
  'alkali-metal':'#e83322',    'alkaline-earth':'#e87022',
  'transition-metal':'#1177cc','post-transition':'#22aa55',
  'metalloid':'#8833cc',       'reactive-nonmetal':'#bb9900',
  'halogen':'#44aa11',         'noble-gas':'#0099aa',
  'lanthanide':'#cc3388',      'actinide':'#cc8811',
  'inner-transition':'#5566aa'
};

/* Lookup table: Unicode superscript characters to integer values */
var SM = {'\u00B9':1,'\u00B2':2,'\u00B3':3,'\u2074':4,'\u2075':5,'\u2076':6,'\u2077':7,'\u2078':8,'\u2079':9,'\u2070':0};

/*
 * Converts a string of Unicode superscript digits to a plain integer.
 * Used to parse electron counts from configuration strings like '2p⁶'.
 * s: string of Unicode superscript characters
 */
function supInt(s){var d='';for(var i=0;i<s.length;i++)if(s[i] in SM)d+=SM[s[i]];return d?parseInt(d,10):1;}

/* Full electron configurations for noble gas core shorthand symbols */
var CORES = {
  '[He]':'1s\u00B2',
  '[Ne]':'1s\u00B2 2s\u00B2 2p\u2076',
  '[Ar]':'1s\u00B2 2s\u00B2 2p\u2076 3s\u00B2 3p\u2076',
  '[Kr]':'1s\u00B2 2s\u00B2 2p\u2076 3s\u00B2 3p\u2076 3d\u00B9\u2070 4s\u00B2 4p\u2076',
  '[Xe]':'1s\u00B2 2s\u00B2 2p\u2076 3s\u00B2 3p\u2076 3d\u00B9\u2070 4s\u00B2 4p\u2076 4d\u00B9\u2070 5s\u00B2 5p\u2076',
  '[Rn]':'1s\u00B2 2s\u00B2 2p\u2076 3s\u00B2 3p\u2076 3d\u00B9\u2070 4s\u00B2 4p\u2076 4d\u00B9\u2070 4f\u00B9\u2074 5s\u00B2 5p\u2076 5d\u00B9\u2070 6s\u00B2 6p\u2076'
};

/*
 * Parses an electron configuration string into an array of subshell objects.
 * Expands noble gas shorthand (e.g. [Xe]) before parsing.
 * Strips parenthetical notes (e.g. 'predicted').
 * Returns array of objects: {n: shell, tp: type, e: electron count}
 * raw: electron configuration string from ELEMENT_INFO
 */
function parseConfig(raw){
  if(!raw) return [];
  raw = raw.replace(/\s*\(.*?\)/g,'').trim();
  for(var c in CORES) if(raw.indexOf(c) !== -1) raw = raw.replace(c, CORES[c]);
  var toks = raw.trim().split(/\s+/), out = [];
  for(var i = 0; i < toks.length; i++){
    var t = toks[i]; if(t.length < 2) continue;
    var n = parseInt(t[0],10), tp = t[1];
    if(isNaN(n) || 'spdf'.indexOf(tp) === -1) continue;
    out.push({n:n, tp:tp, e:supInt(t.substring(2))});
  }
  return out;
}

/* Aufbau order for generating fallback configurations when ELEMENT_INFO lacks config data */
var AUFBAU = [
  {n:1,tp:'s',mx:2},{n:2,tp:'s',mx:2},{n:2,tp:'p',mx:6},{n:3,tp:'s',mx:2},
  {n:3,tp:'p',mx:6},{n:4,tp:'s',mx:2},{n:3,tp:'d',mx:10},{n:4,tp:'p',mx:6},
  {n:5,tp:'s',mx:2},{n:4,tp:'d',mx:10},{n:5,tp:'p',mx:6},{n:6,tp:'s',mx:2},
  {n:4,tp:'f',mx:14},{n:5,tp:'d',mx:10},{n:6,tp:'p',mx:6},{n:7,tp:'s',mx:2},
  {n:5,tp:'f',mx:14},{n:6,tp:'d',mx:10},{n:7,tp:'p',mx:6}
];

/*
 * Generates a subshell array using Aufbau filling order for atomic number Z.
 * Used when no electron configuration string is available in ELEMENT_INFO.
 * Z: atomic number
 */
function fallback(Z){var rem=Z,res=[];for(var i=0;i<AUFBAU.length&&rem>0;i++){var f=Math.min(AUFBAU[i].mx,rem);res.push({n:AUFBAU[i].n,tp:AUFBAU[i].tp,e:f});rem-=f;}return res;}

/* ── Canvas State Variables ──────────────────────────────────── */
var cv = document.getElementById('c');   /* canvas element */
var ctx = cv.getContext('2d');           /* 2D rendering context */
var W=0, H=0, cx=0, cy=0, scale=1;      /* canvas dimensions and center */
var subs = [];                           /* parsed subshell array for current element */
var mode = 'cloud';                      /* 'cloud' or 'orbit' view mode */
var spinning = true;                     /* animation running flag */
var angle = 0;                           /* current rotation angle in radians */
var animId = null;                       /* requestAnimationFrame handle */
var shellR = 0;                          /* radius in pixels per shell unit */
var ds = 1.8;                           /* dot radius in pixels (scaled) */
var nclr = '#cc3300';                   /* current nucleus glow color */
var curZ = 8, curSym = 'O';             /* current element atomic number and symbol */

/* ── Dot Budget ──────────────────────────────────────────────── */

/*
 * Returns the number of dots to draw for a subshell in Cloud View.
 * Limits total dots to ~7000 per frame for smooth 60fps performance.
 * Heavier elements with more subshells get fewer dots each.
 * ss:    subshell object; total: total number of subshells in the current element
 */
function dotBudget(ss, total){
  var base = {s:1350, p:900, d:600, f:420};
  var b = base[ss.tp] || 600;
  var shrink = Math.max(0.28, 1-(total-3)*0.055);
  return Math.round(b*shrink);
}

/* ── Cloud Drawing Functions ─────────────────────────────────── */

/*
 * Draws an s orbital cloud as a sphere of random dots.
 * Dots are distributed by inverse-power-law radial sampling for a
 * denser center, with a hollow gap between shells for n > 1.
 * ss:    subshell object; nDots: number of dots to draw
 */
function drawSCloud(ss, nDots){
  var R = ss.n*shellR;
  var minR = (ss.n > 1) ? R*0.48 : 0;
  var col = subCol(ss);
  ctx.save();
  for(var i = 0; i < nDots; i++){
    var r = minR+(R-minR)*Math.pow(Math.random(),0.42)*(0.28+Math.random()*0.72);
    var theta = Math.random()*Math.PI*2;
    var phi = Math.acos(2*Math.random()-1);
    var x = cx+r*Math.sin(phi)*Math.cos(theta);
    var y = cy+r*Math.sin(phi)*Math.sin(theta);
    var a = 0.9*(1-(r-minR)/(R-minR||1))+0.18;
    ctx.globalAlpha = Math.max(0,Math.min(0.94,a));
    ctx.fillStyle = col;
    ctx.beginPath(); ctx.arc(x,y,ds,0,Math.PI*2); ctx.fill();
  }
  ctx.restore();
}

/*
 * Draws a p orbital cloud as a rotating dumbbell pair of lobes.
 * Three p orbitals are drawn at 60-degree intervals on a rotating axis.
 * ss:      subshell object; nDots: dots per lobe pair; axAngle: rotation angle
 */
function drawPCloud(ss, nDots, axAngle){
  var R = ss.n*shellR;
  var pw = R*0.35;
  var col = subCol(ss);
  ctx.save();
  for(var i = 0; i < nDots; i++){
    var lobe = Math.random()>0.5 ? 1 : -1;
    var dist = R*(0.28+Math.random()*0.72);
    var spread = (Math.random()-0.5)*pw*(1-dist/R);
    var norm = dist/R;
    var x = cx+lobe*dist*Math.cos(axAngle)+spread*Math.sin(axAngle);
    var y = cy+lobe*dist*Math.sin(axAngle)-spread*Math.cos(axAngle);
    var a = 0.86*Math.sin(norm*Math.PI)+0.1;
    ctx.globalAlpha = Math.max(0,Math.min(0.93,a));
    ctx.fillStyle = col;
    ctx.beginPath(); ctx.arc(x,y,ds,0,Math.PI*2); ctx.fill();
  }
  ctx.restore();
}

/*
 * Draws a d orbital cloud using a 4-lobe rose curve: r = |cos(2θ)|.
 * Five d orbitals share the same spatial pattern with rotational offsets.
 * ss:    subshell object; nDots: number of dots; off: angular offset in radians
 */
function drawDCloud(ss, nDots, off){
  var R = ss.n*shellR;
  var col = subCol(ss);
  ctx.save();
  for(var i = 0; i < nDots; i++){
    var theta = Math.random()*Math.PI*2;
    var rl = Math.pow(Math.abs(Math.cos(2*theta)),0.65);
    var r = R*rl*(0.22+Math.random()*0.88);
    var x = cx+r*Math.cos(theta+off);
    var y = cy+r*Math.sin(theta+off);
    ctx.globalAlpha = Math.max(0, rl*0.88);
    ctx.fillStyle = col;
    ctx.beginPath(); ctx.arc(x,y,ds,0,Math.PI*2); ctx.fill();
  }
  ctx.restore();
}

/*
 * Draws an f orbital cloud using a 6-lobe rose curve: r = |cos(3θ)|.
 * Seven f orbitals share the same spatial pattern with rotational offsets.
 * ss:    subshell object; nDots: number of dots; off: angular offset in radians
 */
function drawFCloud(ss, nDots, off){
  var R = ss.n*shellR;
  var col = subCol(ss);
  ctx.save();
  for(var i = 0; i < nDots; i++){
    var theta = Math.random()*Math.PI*2;
    var rl = Math.pow(Math.abs(Math.cos(3*theta)),0.6);
    var r = R*rl*(0.22+Math.random()*0.88);
    var x = cx+r*Math.cos(theta+off);
    var y = cy+r*Math.sin(theta+off);
    ctx.globalAlpha = Math.max(0, rl*0.86);
    ctx.fillStyle = col;
    ctx.beginPath(); ctx.arc(x,y,ds,0,Math.PI*2); ctx.fill();
  }
  ctx.restore();
}

/* ── Nucleus ──────────────────────────────────────────────────── */

/*
 * Draws the nucleus at the canvas center with a radial glow gradient.
 * Nucleus size scales logarithmically with atomic number (larger atoms = bigger nucleus).
 * The element symbol is displayed in white text at the nucleus center.
 */
function drawNucleus(){
  var nr = 8+Math.min(curZ/11,8);
  var gr = ctx.createRadialGradient(cx,cy,0,cx,cy,nr*2.8);
  gr.addColorStop(0,nclr+'dd'); gr.addColorStop(0.45,nclr+'66'); gr.addColorStop(1,nclr+'00');
  ctx.save(); ctx.fillStyle=gr; ctx.beginPath(); ctx.arc(cx,cy,nr*2.8,0,Math.PI*2); ctx.fill();
  var gc = ctx.createRadialGradient(cx-nr*0.3,cy-nr*0.3,0,cx,cy,nr);
  gc.addColorStop(0,'#fff'); gc.addColorStop(0.35,nclr); gc.addColorStop(1,'#000');
  ctx.fillStyle=gc; ctx.beginPath(); ctx.arc(cx,cy,nr,0,Math.PI*2); ctx.fill();
  var fs = Math.max(9,Math.round(nr*1.05));
  ctx.fillStyle='#fff'; ctx.font='bold '+fs+'px "Orbitron",monospace';
  ctx.textAlign='center'; ctx.textBaseline='middle';
  ctx.fillText(curSym,cx,cy);
  ctx.restore();
}

/* ── Cloud View Frame ────────────────────────────────────────── */

/*
 * Renders one frame of the Cloud View.
 * Draws each subshell's dot cloud with the correct orbital shape.
 * d and f orbital clouds receive rotating angular offsets for visual variety.
 */
function drawCloud(){
  var n = subs.length;
  var si_d={}, si_f={};
  for(var i = 0; i < subs.length; i++){
    var ss = subs[i], nd = dotBudget(ss,n);
    if(ss.tp === 's'){
      drawSCloud(ss,nd);
    } else if(ss.tp === 'p'){
      var spd = 0.9/ss.n;
      var ax0 = angle*spd;
      /* Three p orbitals drawn at 60-degree intervals */
      drawPCloud(ss,Math.ceil(nd/3),ax0);
      drawPCloud(ss,Math.ceil(nd/3),ax0+Math.PI/3);
      drawPCloud(ss,Math.ceil(nd/3),ax0+2*Math.PI/3);
    } else if(ss.tp === 'd'){
      var off_d = (si_d[ss.n]||0);
      si_d[ss.n] = (off_d+1);
      drawDCloud(ss,nd,angle*0.65+off_d*0.4);
    } else {
      var off_f = (si_f[ss.n]||0);
      si_f[ss.n] = (off_f+1);
      drawFCloud(ss,nd,angle*0.45+off_f*0.3);
    }
  }
}

/* ── Orbital View Frame ──────────────────────────────────────── */

/*
 * Draws a single glowing electron dot at position (x,y).
 * Uses radial gradient for glow effect plus a bright white center.
 * col: hex color string; r: radius of the electron dot
 */
function drawElectron(x, y, col, r){
  var g = ctx.createRadialGradient(x,y,0,x,y,r*3.2);
  g.addColorStop(0,col); g.addColorStop(0.4,col+'88'); g.addColorStop(1,col+'00');
  ctx.save(); ctx.globalAlpha=0.82; ctx.fillStyle=g;
  ctx.beginPath(); ctx.arc(x,y,r*3.2,0,Math.PI*2); ctx.fill();
  ctx.globalAlpha=1; ctx.fillStyle='#fff';
  ctx.beginPath(); ctx.arc(x,y,r*0.75,0,Math.PI*2); ctx.fill();
  ctx.fillStyle='#111'; ctx.beginPath(); ctx.arc(x,y,r*0.32,0,Math.PI*2); ctx.fill();
  ctx.restore();
}

/*
 * Renders one frame of the Orbital View.
 * Draws dashed orbital rings and animates electron positions along those rings.
 * s: circular orbit; p: elliptical (dumbbell axis); d/f: compressed ellipses.
 */
function drawOrbits(){
  var t = Date.now()/1000;
  for(var i = 0; i < subs.length; i++){
    var ss = subs[i];
    var R = ss.n*shellR;
    var col = subCol(ss);
    var rgb = hexRGB(col);
    var rgba_ring = 'rgba('+rgb[0]+','+rgb[1]+','+rgb[2]+',0.82)';

    if(ss.tp === 's'){
      /* s orbital: circular dashed ring, electrons orbit the nucleus */
      ctx.save(); ctx.strokeStyle=rgba_ring;
      ctx.lineWidth=2.2; ctx.setLineDash([5,4]);
      ctx.beginPath(); ctx.arc(cx,cy,R,0,Math.PI*2); ctx.stroke();
      ctx.restore();
      var ne2 = Math.min(ss.e,2); var spd2 = 2.8/ss.n;
      for(var ei = 0; ei < ne2; ei++){
        var a = t*spd2+ei*Math.PI;
        drawElectron(cx+R*Math.cos(a),cy+R*Math.sin(a),col,4.5*scale);
      }
    } else if(ss.tp === 'p'){
      /* p orbital: three elliptical rings on rotating axes */
      var pspd = 0.9/ss.n;
      for(var ax = 0; ax < 3; ax++){
        var pax = angle*pspd+ax*Math.PI/3;
        ctx.save(); ctx.translate(cx,cy); ctx.rotate(pax);
        ctx.strokeStyle=rgba_ring; ctx.lineWidth=2.2; ctx.setLineDash([4,4]);
        ctx.beginPath(); ctx.ellipse(0,0,R,R*0.32,0,0,Math.PI*2); ctx.stroke();
        ctx.restore();
      }
      var ne_p = Math.min(ss.e,4); var pspd2 = 2.2/ss.n;
      for(var pi = 0; pi < ne_p; pi++){
        var pax2 = angle*(0.9/ss.n)+(pi%3)*Math.PI/3;
        var pa = t*pspd2+(pi < 2 ? 0 : Math.PI);
        drawElectron(cx+R*Math.cos(pax2)*Math.cos(pa),cy+R*Math.sin(pax2)*Math.cos(pa),col,4.5*scale);
      }
    } else if(ss.tp === 'd'){
      /* d orbital: compressed elliptical ring with rotating orientation */
      ctx.save(); ctx.translate(cx,cy); ctx.rotate(angle*0.65+i*0.28);
      ctx.strokeStyle='rgba('+rgb[0]+','+rgb[1]+','+rgb[2]+',0.75)';
      ctx.lineWidth=2; ctx.setLineDash([4,5]);
      ctx.beginPath(); ctx.ellipse(0,0,R,R*0.28,0,0,Math.PI*2); ctx.stroke();
      ctx.restore();
      var ne_d = Math.min(ss.e,3); var dspd = 1.8/ss.n;
      for(var di = 0; di < ne_d; di++){
        var da = t*dspd+di*(Math.PI*2/ne_d);
        drawElectron(cx+R*Math.cos(angle*0.65+i*0.28)*Math.cos(da),cy+R*Math.sin(angle*0.65+i*0.28)*Math.cos(da),col,4*scale);
      }
    } else {
      /* f orbital: most compressed elliptical ring */
      ctx.save(); ctx.translate(cx,cy); ctx.rotate(angle*0.45+i*0.22);
      ctx.strokeStyle='rgba('+rgb[0]+','+rgb[1]+','+rgb[2]+',0.7)';
      ctx.lineWidth=2; ctx.setLineDash([3,5]);
      ctx.beginPath(); ctx.ellipse(0,0,R,R*0.22,0,0,Math.PI*2); ctx.stroke();
      ctx.restore();
      var ne_f = Math.min(ss.e,3); var fspd = 1.5/ss.n;
      for(var fi = 0; fi < ne_f; fi++){
        var fa = t*fspd+fi*(Math.PI*2/ne_f);
        drawElectron(cx+R*Math.cos(angle*0.45+i*0.22)*Math.cos(fa),cy+R*Math.sin(angle*0.45+i*0.22)*Math.cos(fa),col,3.5*scale);
      }
    }
  }
}

/* ── Animation Loop ──────────────────────────────────────────── */

/*
 * Main animation loop called by requestAnimationFrame.
 * Clears the canvas, draws the appropriate view mode, draws the nucleus,
 * advances the rotation angle, and schedules the next frame.
 */
function frame(){
  ctx.clearRect(0,0,W,H);
  ctx.fillStyle='#fff'; ctx.fillRect(0,0,W,H);
  if(mode === 'cloud'){ drawCloud(); } else { drawOrbits(); }
  drawNucleus();
  if(spinning) angle += 0.006;
  animId = requestAnimationFrame(frame);
}

/* ── View Mode Controls ──────────────────────────────────────── */

/*
 * Switches between Cloud View and Orbital View.
 * Updates the active state of the mode toggle buttons.
 * m: 'cloud' or 'orbit'
 */
function setMode(m){
  mode = m;
  document.getElementById('btnCloud').classList.toggle('active', m === 'cloud');
  document.getElementById('btnOrbit').classList.toggle('active', m === 'orbit');
}

/*
 * Toggles the animation between running and paused states.
 * Updates the pause/resume button label accordingly.
 */
function togglePause(){
  spinning = !spinning;
  document.getElementById('btnPause').textContent = spinning ? 'Pause' : 'Resume';
}

/* ── Legend Builder ──────────────────────────────────────────── */

/* Shell letter names (K through Q) indexed by shell number */
var SHELL_NAMES = ['','K','L','M','N','O','P','Q'];

/*
 * Builds the subshell legend below the canvas.
 * Shows one row per unique subshell with color swatch, notation, and description.
 * el:   element row from ELEMENTS array; info: ELEMENT_INFO object for this element
 */
function buildLegend(el, info){
  var leg = document.getElementById('legend');
  leg.innerHTML = '';

  /* First row: nucleus identifier */
  var ni = mkLegItem(nclr,'Nucleus', el[0]+'p · '+Math.round(parseFloat(el[7])-el[0])+'n');
  leg.appendChild(ni);

  /* One row per unique subshell, in the order they appear in the config */
  var seen = {};
  for(var i = 0; i < subs.length; i++){
    var ss = subs[i], key = ss.n+ss.tp;
    if(seen[key]) continue; seen[key] = 1;
    var label = ss.n+ss.tp+(superscript(ss.e));
    var det = SHELL_NAMES[ss.n]+' shell — '+ss.e+' electron'+(ss.e!==1?'s':'')+', '+typeWord(ss.tp)+' orbital';
    leg.appendChild(mkLegItem(subCol(ss),label,det));
  }
}

/*
 * Creates a single legend row element with a color dot, subshell notation, and detail text.
 * col: hex color; sym: subshell notation (e.g. '2p⁶'); det: description string
 */
function mkLegItem(col, sym, det){
  var d = document.createElement('div'); d.className='ol-item';
  d.innerHTML = '<div class="ol-dot" style="background:'+col+'"></div>'
    +'<div class="ol-text"><span class="ol-sym" style="color:'+col+'">'+sym+'</span>'
    +'<span class="ol-det">'+det+'</span></div>';
  return d;
}

/*
 * Returns a human-readable orbital shape name for a given orbital type letter.
 * t: 's', 'p', 'd', or 'f'
 */
function typeWord(t){ return {s:'spherical',p:'dumbbell',d:'four-lobe (clover)',f:'six-lobe (star)'}[t]||t; }

/*
 * Converts an integer to its Unicode superscript representation.
 * Used to display electron counts in configuration notation (e.g. ² ⁶ ¹⁴).
 * n: integer to convert
 */
function superscript(n){
  var m = {0:'\u2070',1:'\u00B9',2:'\u00B2',3:'\u00B3',4:'\u2074',5:'\u2075',6:'\u2076',7:'\u2077',8:'\u2078',9:'\u2079'};
  return (''+n).split('').map(function(c){ return m[c]||c; }).join('');
}

/* ── Info Cards ──────────────────────────────────────────────── */

/*
 * Builds the four informational cards displayed below the legend.
 * Cards cover: isotope identity, electron configuration breakdown,
 * orbital shape explanation, and element significance.
 * el:   element row from ELEMENTS array; info: ELEMENT_INFO object; Z: atomic number
 */
function buildCards(el, info, Z){
  var grid = document.getElementById('info-grid');
  grid.innerHTML = '';

  /* Card 1: Most abundant isotope — proton, neutron, electron counts */
  var mass = parseFloat(el[7])||Z;
  var isoNum = Math.round(mass);
  var neutrons = isoNum-Z;
  var isTxt = '';
  if(typeof SYNTHETIC_ELEMENTS !== 'undefined' && SYNTHETIC_ELEMENTS[Z]){
    isTxt = '<p>Synthetic radioactive element. All isotopes are unstable. The most stable isotope is <strong>'+el[2]+'-'+isoNum+'</strong> with '+Z+' protons, '+neutrons+' neutrons, '+Z+' electrons.</p>';
  } else {
    isTxt = '<p>Most abundant isotope: <strong>'+el[2]+'-'+isoNum+'</strong>. '+Z+' protons &nbsp;·&nbsp; '+neutrons+' neutrons &nbsp;·&nbsp; '+Z+' electrons in a neutral atom. '+(neutrons===Z?'Equal numbers of protons and neutrons.':'')+' '+(el[6]||'')+'</p>';
  }
  grid.appendChild(mkCard('Isotope: '+el[2]+'-'+isoNum, isTxt));

  /* Card 2: Electron configuration broken down by subshell */
  var cfgHtml = '<p>';
  for(var i = 0; i < subs.length; i++){
    var ss = subs[i];
    var col = subCol(ss);
    cfgHtml += '<strong style="color:'+col+'">'+ss.n+ss.tp+superscript(ss.e)+'</strong> — '+ss.e+' electron'+(ss.e!==1?'s':'')+', '+SHELL_NAMES[ss.n]+' shell ('+typeWord(ss.tp)+')<br>';
  }
  cfgHtml += '</p>';
  grid.appendChild(mkCard('Electron Configuration', cfgHtml));

  /* Card 3: Explanation of what each orbital shape looks like and why */
  var types = {}; for(var j = 0; j < subs.length; j++) types[subs[j].tp] = 1;
  var td = [];
  if(types.s) td.push('<strong>Spherical s clouds</strong>: electron density concentrated in a sphere. Bright = higher probability.');
  if(types.p) td.push('<strong>Dumbbell p lobes</strong>: three pairs of lobes rotating in different directions, creating the starfish pattern.');
  if(types.d) td.push('<strong>Clover d orbitals</strong>: four-lobe rose-curve pattern — key to the colorful chemistry of transition metals.');
  if(types.f) td.push('<strong>Star f orbitals</strong>: six-lobe pattern, the most complex shapes in the atom. Found in lanthanides and actinides.');
  grid.appendChild(mkCard("What You're Seeing", '<p>'+td.join('<br><br>')+'<br><br>Brighter = higher probability of finding an electron there. This is the true quantum mechanical picture.</p>'));

  /* Card 4: Element significance — uses full description from ELEMENT_INFO */
  var whyText = (info&&info.description) ? info.description : (info&&info.funFact ? info.funFact : 'Atomic number '+Z+': '+Z+' protons in every '+el[2]+' nucleus.');
  grid.appendChild(mkCard('Why '+el[2]+' Matters', '<p>'+whyText+'</p>'));
}

/*
 * Creates a single info card element with a title heading and HTML body content.
 * title: card heading string; body: HTML content string
 */
function mkCard(title, body){
  var d = document.createElement('div'); d.className='info-card';
  d.innerHTML = '<h3>'+title+'</h3>'+body; return d;
}

/* ── Canvas Resize ───────────────────────────────────────────── */

/*
 * Recalculates canvas size and all derived measurements on window resize.
 * Caps canvas width at 600px and leaves 24px margin on each side.
 * Recomputes shellR (pixels per shell) based on the outermost shell of the element.
 */
function resize(){
  var sz = Math.min(window.innerWidth-24, 600);
  W=cv.width=sz; H=cv.height=sz;
  cx=W/2; cy=H/2; scale=sz/600;
  ds = 1.8*scale;
  var maxN = 0;
  for(var i = 0; i < subs.length; i++) if(subs[i].n > maxN) maxN = subs[i].n;
  shellR = (Math.min(cx,cy)*0.87)/Math.max(maxN,1);
}
window.addEventListener('resize', resize);

/* ── Main Init Function ──────────────────────────────────────── */

/*
 * Initializes the page for the element with the given atomic number.
 * Looks up element data, sets UI text, parses electron configuration,
 * builds legend and info cards, and starts the animation loop.
 * Z: atomic number (1-118)
 */
function init(Z){
  if(!Z || Z < 1 || Z > 118) Z = 8;

  /* Find element in global ELEMENTS array */
  var el = null;
  for(var i = 0; i < ELEMENTS.length; i++) if(ELEMENTS[i][0] === Z){ el=ELEMENTS[i]; break; }
  if(!el) return;

  /* Look up extended element info from ELEMENT_INFO */
  var info = (typeof ELEMENT_INFO !== 'undefined') ? (ELEMENT_INFO[Z]||{}) : {};

  curZ=Z; curSym=el[1];
  nclr = NCLR[el[3]] || '#cc3300';

  /* Update back button link and browser tab title */
  var bb = document.getElementById('back-btn');
  bb.href = '../element.html?n='+Z;
  bb.innerHTML = '&#8592; Back to '+el[2];
  document.title = el[2]+' — Electron Cloud';

  /* Update page header with element identity and electron configuration */
  var sym=el[1]; var name=el[2];
  var cfgStr = info.electronConfig||'';
  var isoNum = Math.round(parseFloat(el[7])||Z);
  document.getElementById('el-title').textContent = sup2(Z)+sym+' '+name+' \u2014 '+isoNum;
  document.getElementById('el-sub').textContent = 'Quantum Mechanical Electron Cloud Model \u00B7 '+(cfgStr||'Z='+Z);

  /* Show synthetic element warning bar if applicable */
  if(typeof SYNTHETIC_ELEMENTS !== 'undefined' && SYNTHETIC_ELEMENTS[Z])
    document.getElementById('wbar').classList.add('show');

  /* Parse electron configuration string; fall back to Aufbau order if unavailable */
  subs = parseConfig(cfgStr);
  if(!subs.length) subs = fallback(Z);

  /* Size the canvas and compute shell radii */
  resize();

  /* Build legend rows and info cards for this element */
  buildLegend(el,info);
  buildCards(el,info,Z);

  /* Cancel any previous animation and start fresh */
  if(animId) cancelAnimationFrame(animId);
  angle=0; spinning=true;
  document.getElementById('btnPause').textContent = 'Pause';
  frame();
}

/*
 * Converts an integer to its Unicode superscript representation.
 * Used to display atomic number in superscript before the element symbol.
 * n: integer to convert
 */
function sup2(n){
  var m = {0:'\u2070',1:'\u00B9',2:'\u00B2',3:'\u00B3',4:'\u2074',5:'\u2075',6:'\u2076',7:'\u2077',8:'\u2078',9:'\u2079'};
  return (''+n).split('').map(function(c){ return m[c]||c; }).join('');
}

/* ── Page Entry Point ─────────────────────────────────────────── */

/* Wait for full page load, then initialize using the URL query parameter */
window.addEventListener('load', function(){
  var p = new URLSearchParams(window.location.search);
  init(parseInt(p.get('n'),10) || 8);
});
</script>
